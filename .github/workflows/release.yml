name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install '.[build]'

      - name: Build release artifact
        run: PYTHON_BIN=python OUTPUT_DIR=dist/releases PYINSTALLER_CONFIG_DIR="${RUNNER_TEMP}/pyinstaller" ./scripts/build-binary.sh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/*
